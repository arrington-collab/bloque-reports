<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bloque Client Reports</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0d1117;color:#e6edf3;display:flex;justify-content:center;align-items:center;min-height:100vh}
.container{text-align:center;max-width:600px;padding:40px}
h1{font-size:28px;margin-bottom:8px;color:#fff}
.sub{color:#8b949e;font-size:15px;margin-bottom:40px}
.cards{display:flex;flex-direction:column;gap:16px}
a.card{display:block;background:#161b22;border:1px solid #30363d;border-radius:12px;padding:24px;text-decoration:none;transition:all .2s}
a.card:hover{border-color:#58a6ff;transform:translateY(-2px);box-shadow:0 4px 20px rgba(88,166,255,.15)}
.card h2{font-size:20px;color:#58a6ff;margin-bottom:6px}
.card p{color:#8b949e;font-size:14px}
.card .count{display:inline-block;background:#21262d;padding:3px 10px;border-radius:10px;font-size:13px;color:#e6edf3;margin-top:8px}
</style>
</head>
<body>
<div class="container"
  <h1>Bloque Client Reports</h1>
  <div class="sub">Advosy Roofing - BloqueClient Assignment Dashboards</div>
  <div class="cards">
    <a href="isaac.html" class="card">
      <h2>Isaac Robinson</h2>
      <p>All BloqueClient files assigned to Isaac</p>
      <span class="count">154 Files</span>
    </a>
    <a href="dillon.html" class="card">
      <h2>Dillon Martella</h2>
      <p>All BloqueClient files assigned to Dillon</p>
      <span class="count">65 Files</span>
    </a>
  </div>
</div>
</body>
</html>
