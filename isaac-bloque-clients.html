<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --panel2: #1e222b;
    --border: #2a2f3a;
    --text: #e6e9ef;
    --muted: #9aa3b2;
    --accent: #4da3ff;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 24px;
  }
  header { max-width: 1100px; margin: 0 auto 20px; }
  h1 { font-size: 22px; margin: 0 0 4px; }
  .sub { color: var(--muted); font-size: 13px; }
  .wrap { max-width: 1100px; margin: 0 auto; }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; margin: 16px 0; }
  .chip {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 20px; padding: 6px 12px; font-size: 13px;
    cursor: pointer; user-select: none; transition: border-color .15s;
  }
  .chip:hover { border-color: var(--accent); }
  .chip.active { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent) inset; }
  .chip .dot { width: 10px; height: 10px; border-radius: 50%; }
  .chip .n { color: var(--muted); font-variant-numeric: tabular-nums; }
  .controls { display: flex; flex-wrap: wrap; gap: 10px; margin: 12px 0 18px; align-items: center; }
  input[type=search], select {
    background: var(--panel2); border: 1px solid var(--border); color: var(--text);
    border-radius: 8px; padding: 9px 12px; font-size: 14px;
  }
  input[type=search] { flex: 1; min-width: 220px; }
  table { width: 100%; border-collapse: collapse; background: var(--panel); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  th, td { text-align: left; padding: 11px 14px; font-size: 14px; border-bottom: 1px solid var(--border); }
  th { color: var(--muted); font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: .04em; cursor: default; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--panel2); }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; color: #fff; white-space: nowrap; }
  .crm-link { font-size: 13px; }
  .count { color: var(--muted); font-size: 13px; margin-bottom: 8px; }
  .empty { padding: 30px; text-align: center; color: var(--muted); }
  footer { max-width: 1100px; margin: 24px auto 0; color: var(--muted); font-size: 12px; }
</style>

const CRM_BASE = "https://sa.claimsforce.net/#BloqueClient/view/";

function stageRank(s) {
  const i = STAGE_ORDER.indexOf(s);
  return i === -1 ? 999 : i;
}
function escapeHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// Sort: pipeline order, then alphabetical within stage
const SORTED = DATA.slice().sort((a, b) => {
  const r = stageRank(a.stage) - stageRank(b.stage);
  if (r !== 0) return r;
  return a.name.localeCompare(b.name);
});

// Counts per stage
const counts = {};
DATA.forEach(c => counts[c.stage] = (counts[c.stage] || 0) + 1);

let activeStage = "";

function buildChips() {
  const chips = document.getElementById("chips");
  const sel = document.getElementById("stageFilter");
  const present = STAGE_ORDER.filter(s => counts[s]);
  const total = document.createElement("div");
  total.className = "chip active";
  total.dataset.stage = "";
  total.innerHTML = '<span class="dot" style="background:#4da3ff"></span>All<span class="n">' + DATA.length + '</span>';
  total.onclick = () => setStage("");
  chips.appendChild(total);
  present.forEach(s => {
    const c = document.createElement("div");
    c.className = "chip";
    c.dataset.stage = s;
    c.innerHTML = '<span class="dot" style="background:' + STAGE_COLORS[s] + '"></span>' + escapeHtml(s) + '<span class="n">' + counts[s] + '</span>';
    c.onclick = () => setStage(s);
    chips.appendChild(c);
    const opt = document.createElement("option");
    opt.value = s; opt.textContent = s + " (" + counts[s] + ")";
    sel.appendChild(opt);
  });
}

function setStage(s) {
  activeStage = s;
  document.getElementById("stageFilter").value = s;
  document.querySelectorAll(".chip").forEach(ch => ch.classList.toggle("active", ch.dataset.stage === s));
  render();
}

function render() {
  const q = document.getElementById("search").value.trim().toLowerCase();
  const rows = document.getElementById("rows");
  rows.innerHTML = "";
  let shown = 0;
  SORTED.forEach(c => {
    if (activeStage && c.stage !== activeStage) return;
    if (q && !c.name.toLowerCase().includes(q)) return;
    shown++;
    const tr = document.createElement("tr");
    const url = CRM_BASE + c.id;
    tr.innerHTML =
      '<td><a href="' + url + '" target="_blank" rel="noopener">' + escapeHtml(c.name) + '</a></td>' +
      '<td><span class="badge" style="background:' + (STAGE_COLORS[c.stage] || "#6c757d") + '">' + escapeHtml(c.stage) + '</span></td>' +
      '<td class="crm-link"><a href="' + url + '" target="_blank" rel="noopener">Open in CRM &rarr;</a></td>';
    rows.appendChild(tr);
  });
  document.getElementById("count").textContent = "Showing " + shown + " of " + DATA.length + " clients";
  if (shown === 0) {
    rows.innerHTML = '<tr><td colspan="3" class="empty">No clients match your filters.</td></tr>';
  }
}

document.getElementById("search").addEventListener("input", render);
document.getElementById("stageFilter").addEventListener("change", e => setStage(e.target.value));
buildChips();
render();
</script>
