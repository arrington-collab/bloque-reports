<style>
:root{--bg:#0d1117;--panel:#161b22;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--accent:#58a6ff;}
*{box-sizing:border-box;}
body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;padding:24px;}
.header{margin-bottom:20px;}
h1{margin:0 0 4px;font-size:24px;}
.sub{color:var(--muted);font-size:13px;}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin:18px 0;}
.chip{display:flex;align-items:center;gap:6px;background:var(--panel);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;cursor:pointer;user-select:none;transition:.15s;}
.chip:hover{border-color:var(--accent);}
.chip.active{outline:2px solid var(--accent);}
.chip .dot{width:9px;height:9px;border-radius:50%;}
.chip .ct{background:rgba(255,255,255,.08);border-radius:10px;padding:1px 7px;font-weight:600;}
.controls{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:16px;}
input[type=text],select{background:var(--panel);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:9px 12px;font-size:14px;}
input[type=text]{min-width:260px;}
.count-label{color:var(--muted);font-size:13px;margin-left:auto;}
table{width:100%;border-collapse:collapse;background:var(--panel);border:1px solid var(--border);border-radius:8px;overflow:hidden;}
th,td{text-align:left;padding:11px 14px;border-bottom:1px solid var(--border);font-size:14px;}
th{background:#1c2128;color:var(--muted);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.04em;cursor:pointer;}
tbody tr:hover{background:#1c2128;}
tbody tr:last-child td{border-bottom:none;}
a{color:var(--accent);text-decoration:none;}
a:hover{text-decoration:underline;}
.badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:12px;font-weight:600;color:#fff;white-space:nowrap;}
.badge.dark{color:#161b22;}
.crm-link{font-size:12px;color:var(--muted);}
.empty{text-align:center;padding:40px;color:var(--muted);}
</style>
