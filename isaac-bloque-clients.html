:root{--bg:#0d1117;--panel:#161b22;--panel2:#1c2230;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--accent:#58a6ff;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;padding:24px;line-height:1.5;}
.wrap{max-width:1100px;margin:0 auto;}
header{margin-bottom:20px;}
h1{font-size:24px;font-weight:700;margin-bottom:4px;}
.sub{color:var(--muted);font-size:14px;}
.updated{color:var(--muted);font-size:12px;margin-top:6px;}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin:18px 0;}
.chip{display:inline-flex;align-items:center;gap:7px;background:var(--panel);border:1px solid var(--border);border-radius:20px;padding:6px 12px;font-size:13px;cursor:pointer;transition:.15s;user-select:none;}
.chip:hover{border-color:var(--accent);}
.chip.active{background:var(--panel2);border-color:var(--accent);}
.chip .dot{width:10px;height:10px;border-radius:50%;}
.chip .ct{color:var(--muted);font-weight:600;}
.controls{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:14px;align-items:center;}
input[type=search]{background:var(--panel);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:10px 14px;font-size:14px;flex:1;min-width:220px;}
input[type=search]:focus{outline:none;border-color:var(--accent);}
select{background:var(--panel);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:10px 14px;font-size:14px;}
.count-line{color:var(--muted);font-size:13px;margin-bottom:10px;}
table{width:100%;border-collapse:collapse;background:var(--panel);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
th{text-align:left;padding:12px 16px;font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);border-bottom:1px solid var(--border);background:var(--panel2);}
td{padding:11px 16px;border-bottom:1px solid var(--border);font-size:14px;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(88,166,255,.05);}
.name a{color:var(--text);text-decoration:none;font-weight:500;}
.name a:hover{color:var(--accent);text-decoration:underline;}
.badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:12px;font-weight:600;color:#fff;white-space:nowrap;}
.crm a{color:var(--accent);text-decoration:none;font-size:13px;}
.crm a:hover{text-decoration:underline;}
.empty{text-align:center;color:var(--muted);padding:40px;}
footer{margin-top:20px;color:var(--muted);font-size:12px;text-align:center;}
@media(max-width:640px){.crm{display:none;}}
</style>
