 :root{--bg:#0d1117;--panel:#161b22;--panel2:#1c2128;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--accent:#58a6ff;}
 *{box-sizing:border-box;}
 body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;}
 .wrap{max-width:1100px;margin:0 auto;padding:24px;}
 header h1{margin:0 0 4px;font-size:24px;}
 header .sub{color:var(--muted);font-size:14px;margin-bottom:2px;}
 header .updated{color:var(--muted);font-size:12px;margin-bottom:20px;}
 .chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px;}
 .chip{display:inline-flex;align-items:center;gap:7px;background:var(--panel);border:1px solid var(--border);border-radius:20px;padding:6px 13px;font-size:13px;cursor:pointer;user-select:none;transition:.15s;}
 .chip:hover{border-color:var(--accent);}
 .chip.active{background:var(--panel2);border-color:var(--accent);box-shadow:0 0 0 1px var(--accent);}
 .chip .dot{width:10px;height:10px;border-radius:50%;}
 .chip .n{color:var(--muted);font-weight:600;}
 .controls{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px;}
 input[type=text],select{background:var(--panel);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:9px 12px;font-size:14px;}
 input[type=text]{flex:1;min-width:200px;}
 input::placeholder{color:var(--muted);}
 table{width:100%;border-collapse:collapse;background:var(--panel);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
 th,td{text-align:left;padding:11px 14px;border-bottom:1px solid var(--border);font-size:14px;}
 th{background:var(--panel2);color:var(--muted);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.04em;cursor:pointer;}
 tr:last-child td{border-bottom:none;}
 tr:hover td{background:var(--panel2);}
 a{color:var(--accent);text-decoration:none;}
 a:hover{text-decoration:underline;}
 .badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:12px;font-weight:600;color:#fff;white-space:nowrap;}
 .crm-link{font-size:13px;}
 .count{color:var(--muted);font-size:13px;margin-bottom:10px;}
 .empty{padding:30px;text-align:center;color:var(--muted);}
 footer{margin-top:24px;color:var(--muted);font-size:12px;text-align:center;}
</style>

const PIPELINE = ["Lead", "Opportunity", "Assigned", "Estimate Request", "Review 1st Estimate", "Estimate Review", "Estimate Complete", "In Negotiations", "Additional Supps", "Need Assistance", "Opportunity Won", "Opportunity Lost"];
const BASE = "https://sa.claimsforce.net/#BloqueClient/view/";
let activeStage = null, sortKey='stage', sortDir=1;
const ord = {}; PIPELINE.forEach((s,i)=>ord[s]=i);

function counts(){const c={};DATA.forEach(r=>c[r.stage]=(c[r.stage]||0)+1);return c;}
function renderChips(){
 const c=counts(), el=document.getElementById('chips');
 let h='<div class="chip'+(activeStage===null?' active':'')+'" data-stage="__all"><span class="dot" style="background:#58a6ff"></span>All <span class="n">'+DATA.length+'</span></div>';
 PIPELINE.forEach(s=>{if(c[s])h+='<div class="chip'+(activeStage===s?' active':'')+'" data-stage="'+s+'"><span class="dot" style="background:'+COLORS[s]+'"></span>'+s+' <span class="n">'+c[s]+'</span></div>';});

}
function fillSelect(){
 const c=counts(),sel=document.getElementById('stageSel');
 let h='<option value="__all">All stages</option>';
 PIPELINE.forEach(s=>{if(c[s])h+='<option value="'+s+'">'+s+' ('+c[s]+')</option>';});
 sel.innerHTML=h;
 sel.onchange=()=>{activeStage=sel.value==='__all'?null:sel.value;render();};
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function render(){
 const q=document.getElementById('search').value.toLowerCase().trim();
 let rows=DATA.filter(r=>(!activeStage||r.stage===activeStage)&&(!q||r.name.toLowerCase().includes(q)));
 rows.sort((a,b)=>{let d;if(sortKey==='stage'){d=(ord[a.stage]??999)-(ord[b.stage]??999);if(d===0)d=a.name.toLowerCase()<b.name.toLowerCase()?-1:1;}else{d=a.name.toLowerCase()<b.name.toLowerCase()?-1:(a.name.toLowerCase()>b.name.toLowerCase()?1:0);}return d*sortDir;});
 const tb=document.getElementById('tbody');
 if(!rows.length){tb.innerHTML='<tr><td colspan="3" class="empty">No clients match.</td></tr>';}
 else tb.innerHTML=rows.map(r=>{const u=BASE+r.id;return '<tr><td><a href="'+u+'" target="_blank">'+esc(r.name)+'</a></td><td><span class="badge" style="background:'+(COLORS[r.stage]||'#6c757d')+'">'+esc(r.stage)+'</span></td><td class="crm-link"><a href="'+u+'" target="_blank">Open in CRM &#8599;</a></td></tr>';}).join('');

 renderChips();
