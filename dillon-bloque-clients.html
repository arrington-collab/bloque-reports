<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Dillon Martella — Bloque Client Assignments</title>
<style>
  :root {
    --bg: #0d1117; --panel: #161b22; --panel2: #1c2330; --border: #2b3340;
    --text: #e6edf3; --muted: #8b949e; --accent: #58a6ff;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    padding: 24px;
  }
  header { max-width: 1100px; margin: 0 auto 20px; }
  h1 { margin: 0 0 4px; font-size: 24px; }
  .sub { color: var(--muted); font-size: 13px; }
  .wrap { max-width: 1100px; margin: 0 auto; }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; margin: 18px 0; }
  .chip {
    display: inline-flex; align-items: center; gap: 8px; cursor: pointer;
    background: var(--panel2); border: 1px solid var(--border); border-radius: 20px;
    padding: 6px 12px; font-size: 13px; user-select: none; transition: .15s;
  }
  .chip:hover { border-color: var(--accent); }
  .chip.active { background: var(--accent); color: #08111f; border-color: var(--accent); font-weight: 600; }
  .chip .dot { width: 10px; height: 10px; border-radius: 50%; }
  .chip .ct { background: rgba(255,255,255,.08); border-radius: 10px; padding: 1px 7px; font-size: 12px; }
  .chip.active .ct { background: rgba(0,0,0,.18); }
  .controls { display: flex; gap: 12px; margin-bottom: 14px; flex-wrap: wrap; }
  input[type=search] {
    flex: 1; min-width: 220px; background: var(--panel); border: 1px solid var(--border);
    color: var(--text); border-radius: 8px; padding: 10px 14px; font-size: 14px;
  }
  input[type=search]:focus { outline: none; border-color: var(--accent); }
  table { width: 100%; border-collapse: collapse; background: var(--panel); border-radius: 10px; overflow: hidden; }
  th, td { text-align: left; padding: 11px 14px; border-bottom: 1px solid var(--border); font-size: 14px; }
  th { color: var(--muted); font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: .04em; cursor: pointer; }
  tr:last-child td { border-bottom: none; }
  tbody tr:hover { background: var(--panel2); }
  td a { color: var(--accent); text-decoration: none; }
  td a:hover { text-decoration: underline; }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; color: #fff; white-space: nowrap; }
  .crm { font-size: 12px; }
  .count { color: var(--muted); font-size: 13px; margin: 4px 0 12px; }
  .empty { padding: 30px; text-align: center; color: var(--muted); }
  footer { max-width: 1100px; margin: 26px auto 0; color: var(--muted); font-size: 12px; }
</style>
</head>
<body>
<header class="wrap">
  <h1>Dillon Martella — Bloque Client Assignments</h1>
  <div class="sub">Source: ClaimsForce CRM &middot; Last updated June 26, 2026 at 09:01 AM MST</div>
</header>

<div class="wrap">
  <div class="chips" id="chips"></div>
  <div class="controls">
    <input type="search" id="search" placeholder="Search by client name...">
  </div>
  <div class="count" id="count"></div>
  <table>
    <thead>
      <tr><th data-sort="name">Client</th><th data-sort="stage">Stage</th><th>CRM</th></tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>
  <footer>58 clients assigned &middot; Generated automatically from ClaimsForce CRM (BloqueClient).</footer>
</div>

function stageRank(s){ const i = STAGE_ORDER.indexOf(s); return i === -1 ? 999 : i; }
DATA.sort((a,b)=>{ const r = stageRank(a.stage)-stageRank(b.stage); return r !== 0 ? r : a.name.localeCompare(b.name); });

let activeStage = null;
let sortKey = null, sortDir = 1;

function counts(){ const m = {}; DATA.forEach(d=>m[d.stage]=(m[d.stage]||0)+1); return m; }

function renderChips(){
  const m = counts();
  const stages = STAGE_ORDER.filter(s=>m[s]);
  const el = document.getElementById('chips');
  el.innerHTML = '';
  const allChip = document.createElement('div');
  allChip.className = 'chip' + (activeStage===null?' active':'');
  allChip.innerHTML = '<span>All</span><span class="ct">'+DATA.length+'</span>';
  allChip.onclick = ()=>{ activeStage=null; render(); };
  el.appendChild(allChip);
  stages.forEach(s=>{
    const c = document.createElement('div');
    c.className = 'chip' + (activeStage===s?' active':'');
    c.innerHTML = '<span class="dot" style="background:'+STAGE_COLORS[s]+'"></span><span>'+s+'</span><span class="ct">'+m[s]+'</span>';
    c.onclick = ()=>{ activeStage = activeStage===s?null:s; render(); };
    el.appendChild(c);
  });
}

function render(){
  renderChips();
  const q = document.getElementById('search').value.trim().toLowerCase();
  let rows = DATA.filter(d=>(!activeStage||d.stage===activeStage)&&(!q||d.name.toLowerCase().includes(q)));
  if(sortKey){
    rows = rows.slice().sort((a,b)=>{
      let v = sortKey==='stage' ? stageRank(a.stage)-stageRank(b.stage) || a.name.localeCompare(b.name) : a.name.localeCompare(b.name);
      return v*sortDir;
    });
  }
  const tb = document.getElementById('rows');
  tb.innerHTML = '';
  if(!rows.length){ tb.innerHTML = '<tr><td colspan="3" class="empty">No matching clients.</td></tr>'; }
  rows.forEach(d=>{
    const tr = document.createElement('tr');
    const url = CRM_BASE + d.id;
    tr.innerHTML = '<td><a href="'+url+'" target="_blank" rel="noopener">'+d.name+'</a></td>'+
      '<td><span class="badge" style="background:'+(STAGE_COLORS[d.stage]||'#6c757d')+'">'+d.stage+'</span></td>'+
      '<td class="crm"><a href="'+url+'" target="_blank" rel="noopener">Open in CRM &#8599;</a></td>';
    tb.appendChild(tr);
  });
  document.getElementById('count').textContent = rows.length + ' of ' + DATA.length + ' clients shown';
}

document.getElementById('search').addEventListener('input', render);
document.querySelectorAll('th[data-sort]').forEach(th=>{
  th.addEventListener('click', ()=>{
    const k = th.getAttribute('data-sort');
    if(sortKey===k){ sortDir*=-1; } else { sortKey=k; sortDir=1; }
    render();
  });
});
render();
</script>
</body>
</html>
