<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dillon Martella — Bloque Client Assignments</title>
<style>
  :root{
    --bg:#0d1117; --panel:#161b22; --panel2:#1c2330; --border:#2d3542;
    --text:#e6edf3; --muted:#8b949e; --accent:#58a6ff;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    font-size:14px;line-height:1.5;}
  .wrap{max-width:1100px;margin:0 auto;padding:28px 20px 60px;}
  header h1{margin:0 0 4px;font-size:24px;font-weight:700;}
  header .sub{color:var(--muted);font-size:13px;}
  .meta{color:var(--muted);font-size:12px;margin-top:6px;}
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin:22px 0 18px;}
  .chip{display:inline-flex;align-items:center;gap:7px;background:var(--panel);
    border:1px solid var(--border);border-radius:20px;padding:6px 12px;font-size:12px;
    cursor:pointer;user-select:none;transition:border-color .15s,background .15s;}
  .chip:hover{border-color:var(--accent);}
  .chip.active{background:var(--panel2);border-color:var(--accent);}
  .chip .dot{width:10px;height:10px;border-radius:50%;}
  .chip .cnt{color:var(--muted);font-weight:600;}
  .chip.total{font-weight:700;}
  .controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:16px;}
  input[type=search]{flex:1;min-width:220px;background:var(--panel);border:1px solid var(--border);
    color:var(--text);border-radius:8px;padding:10px 12px;font-size:14px;outline:none;}
  input[type=search]:focus{border-color:var(--accent);}
  select{background:var(--panel);border:1px solid var(--border);color:var(--text);
    border-radius:8px;padding:10px 12px;font-size:14px;outline:none;}
  table{width:100%;border-collapse:collapse;background:var(--panel);
    border:1px solid var(--border);border-radius:10px;overflow:hidden;}
  thead th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.5px;
    color:var(--muted);padding:11px 14px;border-bottom:1px solid var(--border);background:var(--panel2);}
  tbody td{padding:11px 14px;border-bottom:1px solid var(--border);vertical-align:middle;}
  tbody tr:last-child td{border-bottom:none;}
  tbody tr:hover{background:var(--panel2);}
  .name a{color:var(--text);text-decoration:none;font-weight:600;}
  .name a:hover{color:var(--accent);text-decoration:underline;}
  .badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;
    font-weight:700;color:#fff;white-space:nowrap;}
  .crm a{color:var(--accent);text-decoration:none;font-size:13px;}
  .crm a:hover{text-decoration:underline;}
  .empty{padding:30px;text-align:center;color:var(--muted);}
  footer{margin-top:18px;color:var(--muted);font-size:11px;text-align:center;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Dillon Martella — Bloque Client Assignments</h1>
    <div class="sub">ClaimsForce CRM &middot; assigned client pipeline</div>
    <div class="meta">Last updated: <span id="updated"></span> &middot; <span id="totalmeta"></span> clients</div>
  </header>

  <div class="chips" id="chips"></div>

  <div class="controls">
    <input type="search" id="search" placeholder="Search by client name…" autocomplete="off">
    <select id="stageSel"><option value="">All stages</option></select>
  </div>

  <table>
    <thead><tr><th>Client</th><th>Stage</th><th>CRM Record</th></tr></thead>
    <tbody id="rows"></tbody>
  </table>
  <footer>Auto-generated from ClaimsForce CRM &middot; arrington-collab/bloque-reports</footer>
</div>

<script>

const LAST_UPDATED = "June 26, 2026 at 8:11 AM MST";

// Pipeline order + colors

function stageRank(s){const i=STAGE_ORDER.indexOf(s);return i===-1?999:i;}
function color(s){return STAGE_COLOR[s]||"#6c757d";}

// sort: pipeline order, then alphabetical by name
DATA.sort((a,b)=>{
  const r=stageRank(a.stage)-stageRank(b.stage);
  if(r!==0)return r;
  return a.name.localeCompare(b.name);
});

const counts={};
DATA.forEach(c=>counts[c.stage]=(counts[c.stage]||0)+1);
const presentStages=STAGE_ORDER.filter(s=>counts[s]);

let activeStage="";
let query="";

document.getElementById("updated").textContent=LAST_UPDATED;
document.getElementById("totalmeta").textContent=DATA.length;

// chips
const chipsEl=document.getElementById("chips");
const totalChip=document.createElement("div");
totalChip.className="chip total active";
totalChip.dataset.stage="";
totalChip.innerHTML=`All <span class="cnt">${DATA.length}</span>`;
chipsEl.appendChild(totalChip);
presentStages.forEach(s=>{
  const c=document.createElement("div");
  c.className="chip";c.dataset.stage=s;
  c.innerHTML=`<span class="dot" style="background:${color(s)}"></span>${s} <span class="cnt">${counts[s]}</span>`;
  chipsEl.appendChild(c);
});

// stage select
const sel=document.getElementById("stageSel");
presentStages.forEach(s=>{
  const o=document.createElement("option");o.value=s;o.textContent=`${s} (${counts[s]})`;sel.appendChild(o);
});

function setStage(s){
  activeStage=s;
  sel.value=s;
  document.querySelectorAll(".chip").forEach(ch=>ch.classList.toggle("active",ch.dataset.stage===s));
  render();
}

chipsEl.addEventListener("click",e=>{
  const chip=e.target.closest(".chip");
  if(chip)setStage(chip.dataset.stage);
});
sel.addEventListener("change",()=>setStage(sel.value));
document.getElementById("search").addEventListener("input",e=>{query=e.target.value.toLowerCase().trim();render();});

function render(){
  const rows=document.getElementById("rows");
  const filtered=DATA.filter(c=>
    (!activeStage||c.stage===activeStage)&&
    (!query||c.name.toLowerCase().includes(query))
  );
  if(!filtered.length){
    rows.innerHTML=`<tr><td colspan="3" class="empty">No clients match your filters.</td></tr>`;
    return;
  }
  rows.innerHTML=filtered.map(c=>{
    const url=CRM_BASE+c.id;
    return `<tr>
      <td class="name"><a href="${url}" target="_blank" rel="noopener">${c.name}</a></td>
      <td><span class="badge" style="background:${color(c.stage)}">${c.stage}</span></td>
      <td class="crm"><a href="${url}" target="_blank" rel="noopener">Open in CRM ↗</a></td>
    </tr>`;
  }).join("");
}
render();
</script>
</body>
</html>
