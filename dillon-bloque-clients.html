<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dillon Martella — Bloque Client Assignments</title>
<style>
  :root {
    --bg: #0d1117;
    --panel: #161b22;
    --panel2: #1c2330;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #8b949e;
    --accent: #58a6ff;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 24px;
  }
  header { margin-bottom: 20px; }
  h1 { font-size: 24px; margin: 0 0 4px; }
  .sub { color: var(--muted); font-size: 13px; }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; margin: 18px 0; }
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 999px; padding: 6px 12px; font-size: 13px;
  }
  .chip .dot { width: 10px; height: 10px; border-radius: 50%; }
  .chip .n { font-weight: 700; }
  .controls { display: flex; flex-wrap: wrap; gap: 10px; margin: 16px 0; }
  input[type=text], select {
    background: var(--panel); border: 1px solid var(--border); color: var(--text);
    padding: 9px 12px; border-radius: 8px; font-size: 14px;
  }
  input[type=text] { min-width: 260px; flex: 1; }
  table { width: 100%; border-collapse: collapse; background: var(--panel); border-radius: 10px; overflow: hidden; }
  th, td { text-align: left; padding: 11px 14px; border-bottom: 1px solid var(--border); font-size: 14px; }
  th { background: var(--panel2); color: var(--muted); font-weight: 600; cursor: pointer; user-select: none; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #1a2029; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  .badge {
    display: inline-block; padding: 3px 10px; border-radius: 999px;
    font-size: 12px; font-weight: 600; color: #fff; white-space: nowrap;
  }
  .count { color: var(--muted); font-size: 13px; margin-top: 12px; }
  .crm-link { font-size: 13px; }
</style>
</head>
<body>
<header>
  <h1>Dillon Martella — Bloque Client Assignments</h1>
  <div class="sub">Source: ClaimsForce CRM · <span id="total"></span> clients · Last updated <span id="updated"></span></div>
</header>

<div class="chips" id="chips"></div>

<div class="controls">
  <input type="text" id="search" placeholder="Search by client name…">
  <select id="stageFilter"><option value="">All stages</option></select>
</div>

<table>
  <thead>
    <tr>
      <th data-sort="name">Client Name</th>
      <th data-sort="stage">Stage</th>
      <th>CRM Link</th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>
<div class="count" id="count"></div>

<script>

  "Estimate Review": "#6f42c1",
  "Estimate Complete": "#20c997",

const STAGE_ORDER = ["Lead","Opportunity","Assigned","Estimate Request","Review 1st Estimate","Estimate Review","Estimate Complete","In Negotiations","Additional Supps","Need Assistance","Opportunity Won","Opportunity Lost"];
const CRM_BASE = "https://sa.claimsforce.net/#BloqueClient/view/";

const DATA = [

const stageRank = s => { const i = STAGE_ORDER.indexOf(s); return i === -1 ? 999 : i; };
const color = s => STAGE_COLORS[s] || "#6c757d";

function sortData(arr) {
  return arr.slice().sort((a,b) => {
    const r = stageRank(a.stage) - stageRank(b.stage);
    if (r !== 0) return r;
    return a.name.localeCompare(b.name);
  });
}

let sortMode = "pipeline";

function render() {
  const q = document.getElementById("search").value.toLowerCase();
  const sf = document.getElementById("stageFilter").value;
  let rows = DATA.filter(c => c.name.toLowerCase().includes(q) && (!sf || c.stage === sf));
  if (sortMode === "name") rows.sort((a,b)=>a.name.localeCompare(b.name));
  else if (sortMode === "stage") rows = sortData(rows);
  else rows = sortData(rows);

  const tbody = document.getElementById("tbody");
  tbody.innerHTML = rows.map(c => `
    <tr>
      <td><a href="${CRM_BASE}${c.id}" target="_blank">${c.name}</a></td>
      <td><span class="badge" style="background:${color(c.stage)};${c.stage==='In Negotiations'?'color:#1a1a00;':''}">${c.stage}</span></td>
      <td class="crm-link"><a href="${CRM_BASE}${c.id}" target="_blank">View in CRM ↗</a></td>
    </tr>`).join("");
  document.getElementById("count").textContent = `Showing ${rows.length} of ${DATA.length} clients`;
}

function buildChips() {
  const counts = {};
  DATA.forEach(c => counts[c.stage] = (counts[c.stage]||0)+1);
  const stages = Object.keys(counts).sort((a,b)=>stageRank(a)-stageRank(b));
  document.getElementById("chips").innerHTML = stages.map(s =>
    `<span class="chip"><span class="dot" style="background:${color(s)}"></span>${s} <span class="n">${counts[s]}</span></span>`
  ).join("");
  const sel = document.getElementById("stageFilter");
  stages.forEach(s => { const o = document.createElement("option"); o.value=s; o.textContent=s; sel.appendChild(o); });
}

document.getElementById("total").textContent = DATA.length;
document.getElementById("updated").textContent = "Jun 26, 2026, 9:32 AM MST";
buildChips();
render();
document.getElementById("search").addEventListener("input", render);
document.getElementById("stageFilter").addEventListener("change", render);
document.querySelectorAll("th[data-sort]").forEach(th => th.addEventListener("click", () => { sortMode = th.dataset.sort; render(); }));
</script>
</body>
</html>
