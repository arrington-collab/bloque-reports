<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dillon Martella — Bloque Client Assignments</title>
<style>
  :root{
    --bg:#0d1117; --panel:#161b22; --panel2:#1c2230; --border:#30363d;
    --text:#e6edf3; --muted:#8b949e; --accent:#58a6ff;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;padding:28px 22px 60px;}
  header{max-width:1100px;margin:0 auto 22px;}
  h1{font-size:24px;margin:0 0 4px;font-weight:650;}
  .sub{color:var(--muted);font-size:13px;}
  .chips{display:flex;flex-wrap:wrap;gap:10px;max-width:1100px;margin:0 auto 22px;}
  .chip{background:var(--panel);border:1px solid var(--border);border-radius:20px;
    padding:7px 14px;font-size:13px;display:flex;align-items:center;gap:8px;cursor:pointer;
    user-select:none;transition:border-color .15s,background .15s;}
  .chip:hover{border-color:var(--accent);}
  .chip.active{background:var(--panel2);border-color:var(--accent);}
  .chip .dot{width:10px;height:10px;border-radius:50%;}
  .chip .n{color:var(--muted);font-variant-numeric:tabular-nums;}
  .controls{max-width:1100px;margin:0 auto 16px;display:flex;gap:12px;flex-wrap:wrap;align-items:center;}
  input[type=search]{flex:1;min-width:220px;background:var(--panel);border:1px solid var(--border);
    color:var(--text);border-radius:8px;padding:10px 14px;font-size:14px;outline:none;}
  input[type=search]:focus{border-color:var(--accent);}
  select{background:var(--panel);border:1px solid var(--border);color:var(--text);
    border-radius:8px;padding:10px 12px;font-size:14px;outline:none;cursor:pointer;}
  .wrap{max-width:1100px;margin:0 auto;border:1px solid var(--border);border-radius:12px;overflow:hidden;}
  table{width:100%;border-collapse:collapse;}
  thead th{background:var(--panel);text-align:left;font-size:12px;text-transform:uppercase;
    letter-spacing:.04em;color:var(--muted);padding:12px 16px;border-bottom:1px solid var(--border);}
  tbody td{padding:12px 16px;border-bottom:1px solid var(--border);font-size:14px;vertical-align:middle;}
  tbody tr:last-child td{border-bottom:none;}
  tbody tr:hover{background:var(--panel);}
  .name a{color:var(--text);text-decoration:none;font-weight:500;}
  .name a:hover{color:var(--accent);text-decoration:underline;}
  .badge{display:inline-block;padding:4px 11px;border-radius:20px;font-size:12px;font-weight:600;
    color:#fff;white-space:nowrap;}
  .crm a{color:var(--accent);text-decoration:none;font-size:13px;}
  .crm a:hover{text-decoration:underline;}
  .count{max-width:1100px;margin:14px auto 0;color:var(--muted);font-size:13px;}
  .empty{padding:40px;text-align:center;color:var(--muted);}
</style>
</head>
<body>
<header>
  <h1>Dillon Martella — Bloque Client Assignments</h1>
  <div class="sub">ClaimsForce CRM · <span id="total"></span> clients · Last updated <span id="updated"></span></div>
</header>

<div class="chips" id="chips"></div>

<div class="controls">
  <input type="search" id="search" placeholder="Search by client name…">
  <select id="stageFilter"><option value="">All stages</option></select>
</div>

<div class="wrap">
  <table>
    <thead><tr><th>Client</th><th>Stage</th><th>CRM</th></tr></thead>
    <tbody id="rows"></tbody>
  </table>
</div>
<div class="count" id="count"></div>

<script>
const CRM_BASE = "https://sa.claimsforce.net/#BloqueClient/view/";
const UPDATED = "2026-06-26 15:44 UTC";

const STAGE_COLORS = {

  "Need Assistance":"#ff4444","Opportunity Won":"#28a745","Opportunity Lost":"#6c757d"

const STAGE_ORDER = ["Lead","Opportunity","Assigned","Estimate Request","Review 1st Estimate",
  "Estimate Review","Estimate Complete","In Negotiations","Additional Supps","Need Assistance",
  "Opportunity Won","Opportunity Lost"];

const DATA = [

function stageRank(s){const i=STAGE_ORDER.indexOf(s);return i===-1?999:i;}
function color(s){return STAGE_COLORS[s]||"#6c757d";}
function esc(s){return s.replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}

const sorted = [...DATA].sort((a,b)=>{
  const r=stageRank(a.stage)-stageRank(b.stage);
  return r!==0?r:a.name.localeCompare(b.name);
});

let activeStage = "";
let query = "";

document.getElementById("total").textContent = DATA.length;
document.getElementById("updated").textContent = UPDATED;

// build chips + filter options
const counts = {};
DATA.forEach(d=>counts[d.stage]=(counts[d.stage]||0)+1);
const stagesPresent = STAGE_ORDER.filter(s=>counts[s]);
const chips = document.getElementById("chips");
const sel = document.getElementById("stageFilter");
stagesPresent.forEach(s=>{
  const chip=document.createElement("div");
  chip.className="chip";chip.dataset.stage=s;
  chip.innerHTML=`<span class="dot" style="background:${color(s)}"></span>${esc(s)} <span class="n">${counts[s]}</span>`;
  chip.onclick=()=>{activeStage=activeStage===s?"":s;sel.value=activeStage;syncChips();render();};
  chips.appendChild(chip);
  const o=document.createElement("option");o.value=s;o.textContent=`${s} (${counts[s]})`;sel.appendChild(o);
});
function syncChips(){[...chips.children].forEach(c=>c.classList.toggle("active",c.dataset.stage===activeStage));}

sel.onchange=()=>{activeStage=sel.value;syncChips();render();};
document.getElementById("search").oninput=e=>{query=e.target.value.toLowerCase();render();};

function render(){
  const rows=document.getElementById("rows");
  const list=sorted.filter(d=>(!activeStage||d.stage===activeStage)&&(!query||d.name.toLowerCase().includes(query)));
  if(list.length===0){rows.innerHTML=`<tr><td colspan="3" class="empty">No matching clients.</td></tr>`;}
  else{
    rows.innerHTML=list.map(d=>{
      const url=CRM_BASE+d.id;
      return `<tr>
        <td class="name"><a href="${url}" target="_blank" rel="noopener">${esc(d.name)}</a></td>
        <td><span class="badge" style="background:${color(d.stage)}">${esc(d.stage)}</span></td>
        <td class="crm"><a href="${url}" target="_blank" rel="noopener">Open ↗</a></td>
      </tr>`;
    }).join("");
  }
  document.getElementById("count").textContent=`Showing ${list.length} of ${DATA.length} clients`;
}
render();
</script>
</body>
</html>
