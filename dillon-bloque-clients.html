<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dillon Martella — Bloque Client Assignments</title>
<style>
  :root {
    --bg: #12141a;
    --panel: #1b1e27;
    --panel2: #232733;
    --text: #e8eaf0;
    --muted: #8b91a3;
    --border: #2e3340;
    --accent: #4dabf7;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    padding: 24px;
  }
  header { margin-bottom: 20px; }
  h1 { font-size: 22px; font-weight: 600; }
  .subtitle { color: var(--muted); font-size: 13px; margin-top: 4px; }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; margin: 18px 0; }
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 16px; padding: 5px 12px; font-size: 12.5px;
    cursor: pointer; user-select: none; transition: all .15s;
  }
  .chip:hover { background: var(--panel2); }
  .chip.active { border-color: var(--accent); background: var(--panel2); }
  .chip .dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; }
  .chip .count { color: var(--muted); font-weight: 600; }
  .controls { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
  input[type="search"] {
    flex: 1; min-width: 220px; background: var(--panel);
    border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); padding: 9px 13px; font-size: 14px; outline: none;
  }
  input[type="search"]:focus { border-color: var(--accent); }
  table { width: 100%; border-collapse: collapse; background: var(--panel); border-radius: 10px; overflow: hidden; }
  th, td { text-align: left; padding: 11px 15px; font-size: 14px; }
  th { background: var(--panel2); color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .05em; }
  tr { border-bottom: 1px solid var(--border); }
  tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--panel2); }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  .badge {
    display: inline-block; padding: 3px 10px; border-radius: 12px;
    font-size: 12px; font-weight: 600; color: #fff;
  }
  .crm-link { font-size: 12.5px; }
  .empty { text-align: center; color: var(--muted); padding: 30px; }
  .total { color: var(--muted); font-size: 13px; margin-bottom: 10px; }
</style>
</head>
<body>
<header>
  <h1>Dillon Martella — Bloque Client Assignments</h1>
  <div class="subtitle">Last updated: July 2, 2026 (auto-generated from ClaimsForce CRM)</div>
</header>

<div class="chips" id="chips"></div>

<div class="controls">
  <input type="search" id="search" placeholder="Search clients…">
</div>

<div class="total" id="total"></div>

<table>
  <thead><tr><th>Client</th><th>Stage</th><th>CRM</th></tr></thead>
  <tbody id="rows"></tbody>
</table>

<script>
const CRM_BASE = "https://sa.claimsforce.net/#BloqueClient/view/";
const STAGE_ORDER = ["Lead","Opportunity","Assigned","Estimate Request","Review 1st Estimate","Estimate Review","Estimate Complete","In Negotiations","Additional Supps","Need Assistance","Opportunity Won","Opportunity Lost"];
const STAGE_COLORS = {

  "Estimate Request":"#fd7e14","Review 1st Estimate":"#e83e8c",
  "Estimate Review":"#6f42c1","Estimate Complete":"#20c997",
  "In Negotiations":"#ffc107","Additional Supps":"#dc3545",
  "Need Assistance":"#ff4444","Opportunity Won":"#28a745","Opportunity Lost":"#6c757d"
};
// id|name|stage
const RAW = [
"6a4572d61fed4b58d|Eric Bolek|Estimate Request",
"6a3bfeb824338cede|Lucas Nicholas|Estimate Request",
"6a3ad7f3830198ecf|Ramon Aldecoa|Opportunity Won",

"69d7d98e5a6e7b8df|Socorro Martinez|Opportunity Won",
"69cd4c12273634c1f|Rito Orrantia|In Negotiations",
"69c41648db98bc314|Jessica Sipe|In Negotiations",
"69c15cbc93389c11e|Richard Core|In Negotiations",

"69a7520d78416bf88|Chelsea Benton|Need Assistance",
"69a5b09de52d802da|Kamila Perez|In Negotiations",
"699ddfe4a3348cd41|Sally Wang|Opportunity Won",
"699791da90470af76|Jaylin Sicilia|In Negotiations",
"69972ee426fcd918e|Dondrell Swanson|In Negotiations",
"6993aa03c445151bf|Waldher Seminario|In Negotiations",
"6993a787c7e18264f|Tanner Marvin Fosmire|In Negotiations",
"699340d0cc66f1bb2|Madison Morgan|Opportunity Won",
"698676c37918ec360|Ann Tromba|In Negotiations",
"69861021aa23c70b0|Sharon McQueen|Opportunity Won",
"6980bac30ca565e86|Kevin Richardson|In Negotiations",

"68bb325598bb33866|Sandy Zamora|Opportunity Won"
];

const clients = RAW.map(r => {
  const [id, name, stage] = r.split("|");
  return { id, name, stage };
}).sort((a, b) => {
  const sa = STAGE_ORDER.indexOf(a.stage), sb = STAGE_ORDER.indexOf(b.stage);
  if (sa !== sb) return (sa === -1 ? 99 : sa) - (sb === -1 ? 99 : sb);
  return a.name.localeCompare(b.name);
});

let activeStage = null;
const searchEl = document.getElementById("search");

function stageColor(s) { return STAGE_COLORS[s] || "#6c757d"; }

function renderChips() {
  const counts = {};
  clients.forEach(c => counts[c.stage] = (counts[c.stage] || 0) + 1);
  const stages = STAGE_ORDER.filter(s => counts[s]);
  const el = document.getElementById("chips");
  el.innerHTML = stages.map(s =>
    `<span class="chip${activeStage === s ? " active" : ""}" data-stage="${s}">
      <span class="dot" style="background:${stageColor(s)}"></span>${s} <span class="count">${counts[s]}</span>
    </span>`).join("");
  el.querySelectorAll(".chip").forEach(ch => ch.onclick = () => {
    activeStage = activeStage === ch.dataset.stage ? null : ch.dataset.stage;
    renderChips(); renderRows();
  });
}

function renderRows() {
  const q = searchEl.value.trim().toLowerCase();
  const filtered = clients.filter(c =>
    (!activeStage || c.stage === activeStage) &&
    (!q || c.name.toLowerCase().includes(q)));
  document.getElementById("total").textContent =
    `Showing ${filtered.length} of ${clients.length} clients`;
  const tbody = document.getElementById("rows");
  if (!filtered.length) {
    tbody.innerHTML = `<tr><td colspan="3" class="empty">No matching clients</td></tr>`;
    return;
  }
  tbody.innerHTML = filtered.map(c =>
    `<tr>
      <td><a href="${CRM_BASE}${c.id}" target="_blank" rel="noopener">${c.name}</a></td>
      <td><span class="badge" style="background:${stageColor(c.stage)};${c.stage === "In Negotiations" ? "color:#212529;" : ""}">${c.stage}</span></td>
      <td class="crm-link"><a href="${CRM_BASE}${c.id}" target="_blank" rel="noopener">Open in CRM ↗</a></td>
    </tr>`).join("");
}

searchEl.addEventListener("input", renderRows);
renderChips();
renderRows();
</script>
</body>
</html>
